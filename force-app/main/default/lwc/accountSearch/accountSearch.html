<template>
<lightning-card title="enter key">
    <lightning-input label ="enter the key" onchange={handlechange}></lightning-input>
    <lightning-button label = "search" onclick={handleclick}></lightning-button>
    <!-- show results -->
    <template if:true={accounts}>
        <template for:each={accounts} for:item="acc">
            <div key ={acc.Id}>
                name :{acc.Name}
            </div>
  </template>
    </template>
    <!-- show error -->
    <template if:true={error}>
        <div style="color:green;">
 </div>
 </template>
</lightning-card>
</template>
