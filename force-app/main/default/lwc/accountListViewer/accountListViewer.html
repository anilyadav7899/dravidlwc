<template>
<lightning-card title = "labeled accounts" >
    <lightning-button label = "Load Accounts" onclick={handleClick}></lightning-button>
    <!-- show accounts -->
    <template if:true={accounts}>
        <template for:each={accounts} for:item = "acc">
           <div key = {acc.Id}>
            name : {acc.Name}
           </div>
        </template>
    </template>
    <!-- show error -->
    <template if:true={error}>
      <div style="color:red;" >
        error loading data
      </div>
 </template>
</lightning-card>

</template>
