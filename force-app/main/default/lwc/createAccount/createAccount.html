<template>
<lightning-card label = "create account">
    <lightning-input label = "Account name" onchange={handlechnage}></lightning-input>
    <lightning-button label="create account" onclick = {handleclick}></lightning-button>
    <!-- show thw accounts -->
    <template if:true={account}>
        <div >
            created account:{account.Name}
        </div>
 </template>

 <!-- show error -->
    <template if:true={error}>
        <div style="color:blue;">
            error loading
        </div>
    </template>
</lightning-card>
</template>
